<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <!-- Content Security Policy — diperlonggar untuk Firebase Auth & Google APIs -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src  'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com https://*.googleapis.com;
    style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src    https://fonts.gstatic.com;
    connect-src 'self'
                https://*.googleapis.com
                https://apis.google.com
                https://*.firebase.io
                https://*.firebaseio.com
                wss://*.firebaseio.com
                https://firestore.googleapis.com
                https://identitytoolkit.googleapis.com
                https://fcmregistrations.googleapis.com
                https://securetoken.googleapis.com;
    img-src     'self' data: blob:;
    media-src   'self' blob:;
    worker-src  'self' blob:;
    frame-src   'self' https://accounts.google.com https://*.firebaseapp.com;
    object-src  'none';
    base-uri    'self';
  " />

  <!-- PWA: Theme & display -->
  <meta name="theme-color" content="#3BA894" />
  <meta name="color-scheme" content="light" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap"
    rel="stylesheet"
  />

  <!-- Inline: light-mode lock (harus sebelum render) -->
  <script>
    (function () {
      try {
        document.documentElement.classList.add('light');
        localStorage.removeItem('pad_theme');
      } catch (e) {}
    })();
  </script>

  <!-- PWA: Apple iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SIPAMDAL" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png" />
  <link rel="apple-touch-icon" sizes="144x144" href="/icon-144.png" />
  <link rel="apple-touch-icon" sizes="128x128" href="/icon-128.png" />
  <link rel="apple-touch-startup-image" href="/icon-512.png" />

  <!-- PWA: Android / Chrome -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="SIPAMDAL" />

  <!-- SEO / General meta -->
  <meta name="description" content="Sistem Informasi Pengamanan Dalam BBPKA II Jatinangor" />
  <meta name="keywords" content="SIPAMDAL, BBPKA, Jatinangor, pamdal, patroli, keamanan" />
  <meta name="author" content="Rukman Abu Hamzah" />
  <meta name="robots" content="noindex, nofollow" />

  <!-- Open Graph -->
  <meta property="og:title" content="SIPAMDAL — BBPKA II Jatinangor" />
  <meta property="og:description" content="Sistem Informasi Pengamanan Dalam" />
  <meta property="og:image" content="/icon-512.png" />
  <meta property="og:type" content="website" />

  <!-- Manifest & icons -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icon-48.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="/icon-96.png" />

  <title>SIPAMDAL v1.0.0 – BBPKA II Jatinangor</title>

  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <style>
    #sipamdal-splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px;
      background: linear-gradient(160deg, #E8F4FB 0%, #F4FAFD 60%, #FFFFFF 100%);
      font-family: 'DM Sans', system-ui, sans-serif;
      transition: opacity .35s ease;
    }
    #sipamdal-splash .spinner {
      width: 38px; height: 38px; border-radius: 50%;
      border: 3px solid rgba(14, 165, 233, .18);
      border-top-color: #0EA5E9;
      animation: sipamdal-spin .8s linear infinite;
    }
    #sipamdal-splash .label {
      font-size: 13px; font-weight: 700; color: #475569; letter-spacing: .3px;
    }
    #sipamdal-splash .sub {
      font-size: 11px; color: #94A3B8;
    }
    @keyframes sipamdal-spin { to { transform: rotate(360deg); } }
    #sipamdal-splash.hide { opacity: 0; pointer-events: none; }
  </style>

  <div id="sipamdal-splash">
    <div class="spinner" aria-hidden="true"></div>
    <div class="label">Memuat SIPAMDAL…</div>
    <div class="sub">Menyiapkan komponen &amp; menghubungkan server</div>
  </div>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
